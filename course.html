<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курс — Codepedia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; color: #e0e0e0; }
        
        .header { background: rgba(15, 18, 40, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 107, 0, 0.3); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { font-size: 28px; }
        .code-orange { color: #ff6b00; }
        .pedia { color: #4a90e2; }
        .nav-links a { color: #e0e0e0; text-decoration: none; margin-left: 24px; }
        .nav-links a:hover { color: #ff6b00; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 30px; }
        .course-header { background: rgba(255,255,255,0.05); border-radius: 24px; padding: 30px; margin-bottom: 30px; }
        .course-header h1 { font-size: 32px; margin-bottom: 10px; }
        .course-stats { display: flex; gap: 20px; margin-top: 15px; color: #ff6b00; }
        .level-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin-bottom: 12px; }
        .level-advanced { background: #d32f2f; color: white; }
        .progress-card { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 20px; margin-bottom: 30px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #4caf50; width: 0%; }
        
        .lessons-list { background: rgba(255,255,255,0.05); border-radius: 24px; overflow: hidden; }
        .lesson-item { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; cursor: pointer; transition: background 0.2s; }
        .lesson-item:hover { background: rgba(255,255,255,0.05); }
        .lesson-status { width: 40px; text-align: center; font-size: 22px; }
        .lesson-info { flex: 1; }
        .lesson-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .lesson-desc { font-size: 13px; color: #a0a0a0; }
        .start-btn { background: #ff6b00; border: none; padding: 8px 24px; border-radius: 40px; color: white; cursor: pointer; font-weight: 600; }
        .start-btn:hover { background: #ff8533; }
        
        .footer { text-align: center; padding: 30px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 40px; color: #666; }
        
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.1); padding: 6px 16px 6px 10px; border-radius: 50px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
        .auth-buttons { display: flex; gap: 12px; }
        .login-btn-header, .register-btn-header { padding: 8px 20px; border-radius: 30px; cursor: pointer; }
        .login-btn-header { background: transparent; border: 1px solid #4a90e2; color: #4a90e2; }
        .register-btn-header { background: #ff6b00; border: none; color: white; }
        
        @media (max-width: 768px) { .course-header h1 { font-size: 24px; } .lesson-item { flex-wrap: wrap; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1><span class="code-orange">Code</span><span class="pedia">pedia</span> Courses</h1></div>
        <div class="nav-links">
            <a href="index.html">🏠 Главная</a>
            <a href="courses.html">📚 Курсы</a>
            <a href="tutor-chat.html">💬 Репетитор</a>
        </div>
        <div id="authBlock"></div>
    </div>

    <div class="container">
        <div id="courseContent"><div style="text-align:center; padding:50px;">Загрузка...</div></div>
    </div>

    <div class="footer"><p>Codepedia Courses — подготовка к ВСОШ</p></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');
        let currentUser = null, currentSessionId = localStorage.getItem('sessionId');
        
        async function fetchWithAuth(url, options = {}) {
            return fetch(url, { ...options, headers: { ...options.headers, 'X-Session-Id': currentSessionId } });
        }
        
        async function loadCourse() {
            if (!courseId) { window.location.href = 'courses.html'; return; }
            try {
                const [courseRes, lessonsRes, progressRes] = await Promise.all([
                    fetch(`/api/courses/${courseId}`),
                    fetch(`/api/courses/${courseId}/lessons`),
                    currentUser ? fetchWithAuth(`/api/user-progress`) : Promise.resolve({ ok: false, json: async () => ({}) })
                ]);
                const course = await courseRes.json();
                const lessons = await lessonsRes.json();
                const progress = progressRes.ok ? await progressRes.json() : {};
                
                const completedCount = Object.values(progress).filter(p => p && p.completed === true).length;
                const percent = lessons.length ? (completedCount / lessons.length * 100) : 0;
                
                document.getElementById('courseContent').innerHTML = `
                    <div class="course-header">
                        <div><span class="level-badge level-advanced">🔥 Продвинутый</span></div>
                        <h1>📘 ${escapeHtml(course.title)}</h1>
                        <p>${escapeHtml(course.description)}</p>
                        <div class="course-stats"><span>📖 ${course.lessons_count} уроков</span><span>⏱️ ${course.duration}</span></div>
                    </div>
                    <div class="progress-card">
                        <div style="display: flex; justify-content: space-between;"><span>📊 Ваш прогресс</span><span>${completedCount}/${course.lessons_count} уроков</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
                    </div>
                    <div class="lessons-list">
                        ${lessons.map(lesson => {
                            const isCompleted = progress[lesson.id]?.completed === true;
                            return `
                                <div class="lesson-item" onclick="goToLesson(${lesson.id})">
                                    <div class="lesson-status">${isCompleted ? '✅' : '📘'}</div>
                                    <div class="lesson-info">
                                        <div class="lesson-title">${lesson.lesson_number}. ${escapeHtml(lesson.title)}</div>
                                        <div class="lesson-desc">Урок ${lesson.lesson_number} из ${course.lessons_count}</div>
                                    </div>
                                    <button class="start-btn">${isCompleted ? 'Повторить' : 'Начать'}</button>
                                </div>`;
                        }).join('')}
                    </div>`;
            } catch(e) { document.getElementById('courseContent').innerHTML = '<div style="text-align:center;padding:50px;">Ошибка загрузки</div>'; }
        }
        
        function goToLesson(lessonId) { window.location.href = `lesson.html?course_id=${courseId}&lesson_id=${lessonId}`; }
        function escapeHtml(t) { const div = document.createElement('div'); div.textContent = t; return div.innerHTML; }
        
        async function loadUser() {
            if (!currentSessionId) return;
            try {
                const res = await fetch('/api/me', { headers: { 'X-Session-Id': currentSessionId } });
                if (res.ok) currentUser = (await res.json()).user;
            } catch(e) {}
        }
        
        function updateUI() {
            const authBlock = document.getElementById('authBlock');
            if (currentUser) {
                authBlock.innerHTML = `<div class="user-info"><img class="user-avatar" src="${currentUser.avatar || ''}"><span class="user-name">${currentUser.name || currentUser.email}</span><button onclick="logout()">Выйти</button></div>`;
            } else {
                authBlock.innerHTML = `<div class="auth-buttons"><button onclick="location.href='index.html'">Вход</button><button onclick="location.href='index.html'">Регистрация</button></div>`;
            }
        }
        
        async function logout() { if (currentSessionId) await fetch('/api/logout', { method: 'POST', headers: { 'X-Session-Id': currentSessionId } }); localStorage.clear(); window.location.href = 'index.html'; }
        
        loadUser().then(() => { updateUI(); loadCourse(); });
    </script>
</body>
</html>
