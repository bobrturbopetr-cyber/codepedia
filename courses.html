<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курсы — Codepedia Courses</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f5f7fb; }
        .courses-header {
            background: linear-gradient(135deg, #1e2a3a 0%, #0f1722 100%);
            padding: 50px 30px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        .courses-header h1 { font-size: 36px; margin-bottom: 10px; }
        .courses-header p { opacity: 0.8; }
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        .course-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
        .course-cover {
            height: 140px;
            background: linear-gradient(135deg, #ff6b00, #ff8533);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .course-info { padding: 24px; }
        .course-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #1a2a3a; }
        .course-desc { color: #5a6e7c; font-size: 14px; line-height: 1.5; margin-bottom: 16px; }
        .course-meta { display: flex; gap: 20px; font-size: 13px; color: #ff6b00; margin-bottom: 20px; }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: #ff6b00; width: 0%; transition: width 0.3s; }
        .btn-continue {
            background: #ff6b00;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-continue:hover { background: #e05a00; }
        .level-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .level-beginner { background: #dcfce7; color: #15803d; }
        .level-intermediate { background: #fed7aa; color: #9a3412; }
        .level-advanced { background: #fee2e2; color: #b91c1c; }
        .loading { text-align: center; padding: 60px; color: #64748b; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1><span class="code-orange">Code</span><span class="pedia">pedia</span> <span style="font-size:14px">Courses</span></h1></div>
        <div class="nav-links">
            <a href="index.html">🏠 Главная</a>
            <a href="courses.html" class="active">📚 Курсы</a>
            <a href="progress.html">📊 Мой прогресс</a>
            <a href="tutor.html">💬 Репетитор</a>
        </div>
        <div id="authBlock"></div>
    </div>

    <div class="container" style="padding: 30px; max-width: 1300px; margin: 0 auto;">
        <div class="courses-header">
            <h1>🎓 Codepedia Courses</h1>
            <p>Подготовка к Всероссийской олимпиаде школьников по информатике</p>
        </div>
        <div id="coursesGrid" class="courses-grid"><div class="loading">Загрузка курсов...</div></div>
    </div>

    <div class="footer"><p>Codepedia Courses — подготовка к ВСОШ | © 2024-2026</p></div>

    <script>
        let currentUser = null;
        let currentSessionId = localStorage.getItem('sessionId');
        async function fetchWithAuth(url, options = {}) {
            const res = await fetch(url, { ...options, headers: { ...options.headers, 'X-Session-Id': currentSessionId } });
            return res;
        }
        async function loadUser() {
            if (!currentSessionId) return null;
            try {
                const res = await fetch('/api/me', { headers: { 'X-Session-Id': currentSessionId } });
                if (res.ok) { const data = await res.json(); currentUser = data.user; return currentUser; }
            } catch(e) {}
            return null;
        }
        async function loadCourses() {
            try {
                const coursesRes = await fetch('/api/courses');
                const courses = await coursesRes.json();
                let progress = {};
                if (currentUser) {
                    const progressRes = await fetchWithAuth('/api/user-progress');
                    if (progressRes.ok) progress = await progressRes.json();
                }
                const grid = document.getElementById('coursesGrid');
                if (!courses.length) { grid.innerHTML = '<div class="loading">Курсы скоро появятся...</div>'; return; }
                grid.innerHTML = courses.map(course => {
                    const courseProgress = progress[course.id] || { completed: 0, total: course.lessons_count };
                    const percent = courseProgress.total ? (courseProgress.completed / courseProgress.total * 100) : 0;
                    const levelText = { beginner: '🌱 Начинающий', intermediate: '📘 Средний', advanced: '🔥 Продвинутый' }[course.level];
                    const levelClass = { beginner: 'level-beginner', intermediate: 'level-intermediate', advanced: 'level-advanced' }[course.level];
                    return `
                        <div class="course-card">
                            <div class="course-cover">${course.cover || '📚'}</div>
                            <div class="course-info">
                                <div><span class="level-badge ${levelClass}">${levelText}</span></div>
                                <div class="course-title">${escapeHtml(course.title)}</div>
                                <div class="course-desc">${escapeHtml(course.description)}</div>
                                <div class="course-meta"><span>⏱️ ${course.duration}</span><span>📖 ${course.lessons_count} уроков</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
                                <button class="btn-continue" onclick="window.location.href='course.html?id=${course.id}'">${percent === 0 ? '🚀 Начать курс' : percent === 100 ? '✅ Пройден' : '📖 Продолжить'}</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch(e) { document.getElementById('coursesGrid').innerHTML = '<div class="loading">Ошибка загрузки курсов</div>'; }
        }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function updateUI() {
            const authBlock = document.getElementById('authBlock');
            if (currentUser) authBlock.innerHTML = `<div class="user-info" style="display: flex; align-items: center; gap: 12px; background:white; padding:6px 16px; border-radius:50px;"><img class="user-avatar" src="https://api.dicebear.com/7.x/initials/svg?seed=${currentUser.name || currentUser.email}" width="36" height="36" style="border-radius: 50%;"><span class="user-name">${currentUser.name || currentUser.email}</span><button class="logout-btn" onclick="logout()">Выйти</button></div>`;
            else authBlock.innerHTML = `<div class="auth-buttons"><button class="login-btn-header" onclick="window.location.href='index.html'">Вход</button><button class="register-btn-header" onclick="window.location.href='index.html'">Регистрация</button></div>`;
        }
        async function logout() {
            if (currentSessionId) await fetch('/api/logout', { method: 'POST', headers: { 'X-Session-Id': currentSessionId } });
            localStorage.removeItem('sessionId'); localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
        async function init() { await loadUser(); updateUI(); await loadCourses(); }
        init();
    </script>
</body>
</html>
