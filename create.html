<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать статью — Codepedia</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .create-container { max-width: 1200px; margin: 0 auto; padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-family: inherit;
        }
        .form-group textarea { min-height: 400px; font-family: monospace; resize: vertical; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .btn-save { background: #ff6b00; color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-save:hover { background: #ff8533; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .message.success { background: #e8f5e9; color: #2e7d32; display: block; }
        .message.error { background: #ffebee; color: #c62828; display: block; }
        .message.warning { background: #fff3e0; color: #ed6c02; display: block; }
        .header { background: #0f1228; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 24px; color: #ff6b00; margin: 0; }
        .nav-links a { color: #e0e0e0; text-decoration: none; margin-left: 20px; }
        .auth-buttons { display: flex; gap: 10px; }
        .login-btn { background: transparent; border: 1px solid #4a90e2; color: #4a90e2; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-name { color: white; }
        .logout-btn { background: #555; border: none; padding: 6px 12px; border-radius: 6px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1><span style="color:#ff6b00">Code</span><span style="color:#4a90e2">pedia</span></h1></div>
        <div class="nav-links">
            <a href="index.html">🏠 Главная</a>
            <a href="create.html">✏️ Создать</a>
        </div>
        <div id="authBlock"></div>
    </div>

    <div class="create-container">
        <h1>✏️ Создать новую статью</h1>
        <div id="message" class="message"></div>

        <div id="createForm" style="display: none;">
            <div class="form-row">
                <div class="form-group">
                    <label>📝 Название статьи *</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label>🔖 URL (slug) *</label>
                    <input type="text" id="slug" required placeholder="vvedenie-v-python">
                    <small>Только латиница, цифры и дефисы</small>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>📂 Категория</label>
                    <select id="category">
                        <option value="languages">📖 Языки программирования</option>
                        <option value="algorithms">🧮 Алгоритмы</option>
                        <option value="concepts">🧠 Концепции</option>
                        <option value="tools">🛠️ Инструменты</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>⭐ Сложность</label>
                    <select id="difficulty">
                        <option value="easy">🌱 Новичок</option>
                        <option value="medium">📘 Средний</option>
                        <option value="hard">🔥 Продвинутый</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🏷️ Теги (через запятую)</label>
                    <input type="text" id="tags" placeholder="python, основы, уроки">
                </div>
            </div>
            <div class="form-group">
                <label>📌 Краткое описание</label>
                <textarea id="excerpt" rows="3" placeholder="Коротко о чём статья..."></textarea>
            </div>
            <div class="form-group">
                <label>📄 Содержание статьи (HTML)</label>
                <textarea id="content" rows="15" placeholder="&lt;h2&gt;Введение&lt;/h2&gt;
&lt;p&gt;Текст статьи...&lt;/p&gt;

&lt;h2&gt;Пример кода&lt;/h2&gt;
&lt;pre&gt;&lt;code&gt;
print('Hello, Codepedia!')
&lt;/code&gt;&lt;/pre&gt;" required></textarea>
                <small>Можно использовать HTML: заголовки &lt;h2&gt;, &lt;h3&gt;, абзацы &lt;p&gt;, &lt;pre&gt;&lt;code&gt; для кода</small>
            </div>
            <button type="button" class="btn-save" onclick="saveArticle()">💾 Опубликовать статью</button>
        </div>
        
        <div id="loginRequired" style="display: none; text-align: center; padding: 50px;">
            <h2>🔐 Требуется авторизация</h2>
            <p>Только зарегистрированные пользователи могут создавать статьи.</p>
            <button class="login-btn" onclick="window.location.href='index.html'">Войти или зарегистрироваться</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentSessionId = localStorage.getItem('sessionId');

        async function checkAuth() {
            if (!currentSessionId) {
                showLoginRequired();
                return false;
            }
            
            try {
                const res = await fetch('/api/me', {
                    headers: { 'X-Session-Id': currentSessionId }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    currentUser = data.user;
                    showCreateForm();
                    updateUI();
                    return true;
                } else {
                    localStorage.removeItem('sessionId');
                    currentSessionId = null;
                    showLoginRequired();
                    return false;
                }
            } catch (err) {
                showLoginRequired();
                return false;
            }
        }
        
        function showCreateForm() {
            document.getElementById('createForm').style.display = 'block';
            document.getElementById('loginRequired').style.display = 'none';
        }
        
        function showLoginRequired() {
            document.getElementById('createForm').style.display = 'none';
            document.getElementById('loginRequired').style.display = 'block';
        }
        
        function updateUI() {
            const authBlock = document.getElementById('authBlock');
            if (currentUser) {
                authBlock.innerHTML = `
                    <div class="user-info">
                        <span class="user-name">👤 ${currentUser.name || currentUser.email}</span>
                        <button class="logout-btn" onclick="logout()">Выйти</button>
                    </div>
                `;
            } else {
                authBlock.innerHTML = `
                    <div class="auth-buttons">
                        <button class="login-btn" onclick="window.location.href='index.html'">Вход</button>
                    </div>
                `;
            }
        }
        
        async function logout() {
            if (currentSessionId) {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: { 'X-Session-Id': currentSessionId }
                });
            }
            localStorage.removeItem('sessionId');
            currentSessionId = null;
            currentUser = null;
            showLoginRequired();
            updateUI();
        }
        
        async function saveArticle() {
            if (!currentUser) {
                showMessage('Необходимо войти в систему', 'warning');
                return;
            }
            
            const title = document.getElementById('title').value;
            const slug = document.getElementById('slug').value;
            const category = document.getElementById('category').value;
            const difficulty = document.getElementById('difficulty').value;
            const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(t => t);
            const excerpt = document.getElementById('excerpt').value;
            const content = document.getElementById('content').value;
            const msgDiv = document.getElementById('message');

            if (!title || !slug || !content) {
                showMessage('❌ Заполните название, URL и содержание статьи', 'error');
                return;
            }

            if (!/^[a-z0-9-]+$/.test(slug)) {
                showMessage('❌ URL может содержать только латиницу, цифры и дефисы', 'error');
                return;
            }

            showMessage('⏳ Публикация...', 'success');

            try {
                const res = await fetch('/api/articles', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Session-Id': currentSessionId
                    },
                    body: JSON.stringify({ 
                        title, slug, category, difficulty, tags, 
                        excerpt, content,
                        date: new Date().toISOString().split('T')[0]
                    })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    showMessage(`✅ Статья "${title}" успешно опубликована!`, 'success');
                    document.getElementById('title').value = '';
                    document.getElementById('slug').value = '';
                    document.getElementById('content').value = '';
                    setTimeout(() => {
                        window.location.href = `/article.html?slug=${slug}`;
                    }, 2000);
                } else {
                    showMessage(`❌ ${data.error || 'Ошибка при публикации'}`, 'error');
                }
            } catch (err) {
                showMessage('❌ Ошибка соединения с сервером', 'error');
            }
        }
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = msg;
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 5000);
        }

        // Автогенерация slug из названия
        document.getElementById('title').addEventListener('input', function() {
            let slug = this.value
                .toLowerCase()
                .replace(/[^a-zа-яё0-9\s]/gi, '')
                .replace(/\s+/g, '-')
                .replace(/[^a-z0-9-]/gi, '');
            document.getElementById('slug').value = slug;
        });
        
        // Запуск проверки авторизации
        checkAuth();
    </script>
</body>
</html>
