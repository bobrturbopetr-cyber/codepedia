<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Урок — Codepedia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; color: #e0e0e0; }
        
        .header { background: rgba(15, 18, 40, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 107, 0, 0.3); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { font-size: 28px; }
        .code-orange { color: #ff6b00; }
        .pedia { color: #4a90e2; }
        .nav-links a { color: #e0e0e0; text-decoration: none; margin-left: 24px; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; display: flex; gap: 30px; flex-wrap: wrap; }
        .theory { flex: 2; background: rgba(255,255,255,0.05); border-radius: 24px; padding: 30px; }
        .theory h1, .theory h2, .theory h3 { margin: 20px 0 10px; }
        .theory p { line-height: 1.6; margin: 15px 0; }
        .theory pre { background: #1e1e2e; padding: 16px; border-radius: 12px; overflow-x: auto; margin: 15px 0; }
        .theory code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 6px; }
        
        .task-sidebar { flex: 1.2; background: rgba(255,255,255,0.05); border-radius: 24px; padding: 24px; position: sticky; top: 20px; height: fit-content; }
        .task-sidebar h3 { color: #ff6b00; margin-bottom: 16px; }
        .task-text { background: rgba(0,0,0,0.3); padding: 16px; border-radius: 12px; margin-bottom: 20px; }
        .solution-input { width: 100%; min-height: 250px; background: #1e1e2e; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #e0e0e0; font-family: 'Consolas', monospace; padding: 16px; margin: 15px 0; font-size: 13px; }
        .check-btn { background: #ff6b00; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .check-btn:hover { background: #ff8533; }
        .feedback { margin-top: 15px; padding: 12px; border-radius: 12px; display: none; }
        .feedback.success { background: rgba(46,125,50,0.2); border: 1px solid #2e7d32; color: #81c784; display: block; }
        .feedback.error { background: rgba(198,40,40,0.2); border: 1px solid #c62828; color: #ef9a9a; display: block; }
        .feedback.warning { background: rgba(255,152,0,0.2); border: 1px solid #ff9800; color: #ffb74d; display: block; }
        .complete-btn { background: #4caf50; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px; }
        .complete-btn:disabled { background: #666; cursor: not-allowed; }
        .navigation { display: flex; justify-content: space-between; margin-top: 25px; }
        .nav-link { color: #4a90e2; text-decoration: none; }
        
        .notes-section { background: rgba(255,215,0,0.1); border-left: 4px solid #ffd700; padding: 20px; margin-top: 20px; border-radius: 12px; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.1); padding: 6px 16px 6px 10px; border-radius: 50px; }
        
        @media (max-width: 1000px) { .container { flex-direction: column; } .task-sidebar { position: static; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1><span class="code-orange">Code</span><span class="pedia">pedia</span> Courses</h1></div>
        <div class="nav-links">
            <a href="courses.html">📚 К курсам</a>
            <a href="tutor-chat.html">💬 Репетитор</a>
        </div>
        <div id="authBlock"></div>
    </div>

    <div class="container" id="lessonContent"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('course_id'), lessonId = urlParams.get('lesson_id');
        let currentUser = null, currentSessionId = localStorage.getItem('sessionId');
        
        async function fetchWithAuth(url, options = {}) {
            return fetch(url, { ...options, headers: { ...options.headers, 'X-Session-Id': currentSessionId } });
        }
        
        async function loadLesson() {
            if (!courseId || !lessonId) { window.location.href = 'courses.html'; return; }
            try {
                const [lessonRes, progressRes] = await Promise.all([
                    fetch(`/api/lessons/${lessonId}`),
                    currentUser ? fetchWithAuth(`/api/user-progress/${lessonId}`) : Promise.resolve({ ok: false, json: async () => ({ completed: false }) })
                ]);
                const lesson = await lessonRes.json();
                const progress = progressRes.ok ? await progressRes.json() : { completed: false, solution: '' };
                const isCompleted = progress.completed === true;
                
                document.getElementById('lessonContent').innerHTML = `
                    <div class="theory">
                        <h1>📘 ${escapeHtml(lesson.title)}</h1>
                        ${lesson.theory || '<p>Теория загружается...</p>'}
                        <div class="notes-section">
                            <strong>📝 Конспект урока</strong><br>
                            ${lesson.notes || '<p>Основные моменты из теории выше.</p>'}
                        </div>
                    </div>
                    <div class="task-sidebar">
                        <h3>📝 Задание</h3>
                        <div class="task-text">${lesson.task || 'Решите задачу и отправьте решение на проверку.'}</div>
                        ${lesson.task_examples ? `<pre style="background:rgba(0,0,0,0.3); padding:12px; border-radius:8px;"><code>${escapeHtml(lesson.task_examples)}</code></pre>` : ''}
                        <textarea id="solution" class="solution-input" placeholder="Введите код на C++...">${escapeHtml(progress.solution || lesson.test_code || '')}</textarea>
                        <button class="check-btn" onclick="checkSolution()">🔍 Проверить решение</button>
                        <div id="feedback" class="feedback"></div>
                        <button class="complete-btn" id="completeBtn" onclick="completeLesson()" ${isCompleted ? 'disabled' : ''}>${isCompleted ? '✅ Урок пройден' : '🎉 Завершить урок'}</button>
                        <div class="navigation">
                            <a href="course.html?id=${courseId}" class="nav-link">← Вернуться к курсу</a>
                            <a href="tutor-chat.html" class="nav-link">💬 Спросить репетитора</a>
                        </div>
                    </div>
                `;
                if (isCompleted) document.getElementById('solution').readOnly = true;
            } catch(e) { document.getElementById('lessonContent').innerHTML = '<div style="text-align:center;padding:50px;">Ошибка загрузки урока</div>'; }
        }
        
        async function checkSolution() {
            const code = document.getElementById('solution').value;
            if (!code.trim()) { showFeedback('Введите решение', 'error'); return; }
            showFeedback('⏳ Проверка кода...', 'warning');
            try {
                const res = await fetch('/api/check-solution', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lesson_id: parseInt(lessonId), code: code })
                });
                const data = await res.json();
                if (data.correct) showFeedback('✅ Решение верное! Отлично!', 'success');
                else showFeedback(`❌ Решение неверное.\n${data.message || 'Попробуйте ещё раз.'}`, 'error');
            } catch(e) { showFeedback('Ошибка проверки', 'error'); }
        }
        
        async function completeLesson() {
            if (!currentUser) { alert('Войдите в аккаунт'); return; }
            const code = document.getElementById('solution').value;
            if (!code.trim()) { showFeedback('Сначала введите решение', 'error'); return; }
            try {
                const checkRes = await fetch('/api/check-solution', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lesson_id: parseInt(lessonId), code: code })
                });
                const checkData = await checkRes.json();
                if (!checkData.correct) { showFeedback('❌ Решение неверное. Исправьте ошибки.', 'error'); return; }
                
                const res = await fetchWithAuth('/api/user-progress', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lesson_id: lessonId, solution: code, completed: true })
                });
                if (res.ok) {
                    showFeedback('🎉 Урок завершён! Прогресс сохранён.', 'success');
                    document.getElementById('completeBtn').disabled = true;
                    document.getElementById('completeBtn').textContent = '✅ Пройдено';
                    setTimeout(() => { window.location.href = `course.html?id=${courseId}`; }, 1500);
                } else showFeedback('Ошибка сохранения', 'error');
            } catch(e) { showFeedback('Ошибка соединения', 'error'); }
        }
        
        function showFeedback(msg, type) {
            const fb = document.getElementById('feedback');
            fb.textContent = msg;
            fb.className = `feedback ${type}`;
            setTimeout(() => { if (fb.className === `feedback ${type}`) fb.className = 'feedback'; }, 5000);
        }
        
        function escapeHtml(t) { const div = document.createElement('div'); div.textContent = t; return div.innerHTML; }
        
        async function loadUser() {
            if (!currentSessionId) return;
            try {
                const res = await fetch('/api/me', { headers: { 'X-Session-Id': currentSessionId } });
                if (res.ok) currentUser = (await res.json()).user;
            } catch(e) {}
        }
        
        function updateUI() {
            const authBlock = document.getElementById('authBlock');
            if (currentUser) {
                authBlock.innerHTML = `<div class="user-info"><img class="user-avatar" src="${currentUser.avatar || ''}"><span>${currentUser.name || currentUser.email}</span><button onclick="logout()" style="background:none; border:1px solid #ff5252; color:#ff5252; padding:4px 12px; border-radius:20px;">Выйти</button></div>`;
            } else {
                authBlock.innerHTML = `<div class="auth-buttons"><button class="login-btn-header" onclick="location.href='index.html'">Вход</button><button class="register-btn-header" onclick="location.href='index.html'">Регистрация</button></div>`;
            }
        }
        
        async function logout() { if (currentSessionId) await fetch('/api/logout', { method: 'POST', headers: { 'X-Session-Id': currentSessionId } }); localStorage.clear(); window.location.href = 'index.html'; }
        
        loadUser().then(() => { updateUI(); loadLesson(); });
    </script>
</body>
</html>
