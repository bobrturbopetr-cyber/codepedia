<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор сайта — Codepedia Hosting</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1e1e2e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #2d2d3a; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3d3d4a; }
        .logo h1 { font-size: 20px; }
        .code-orange { color: #ff6b00; }
        .pedia { color: #4a90e2; }
        .nav-links a { color: #a0a0a0; text-decoration: none; margin-left: 20px; }
        .nav-links a:hover { color: #ff6b00; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        .file-manager { width: 320px; background: #252535; border-right: 1px solid #3d3d4a; display: flex; flex-direction: column; overflow: hidden; }
        .file-manager-header { padding: 16px; border-bottom: 1px solid #3d3d4a; display: flex; gap: 10px; flex-wrap: wrap; }
        .file-manager-header button { background: #3d3d4a; border: none; padding: 8px 14px; border-radius: 8px; color: white; cursor: pointer; font-size: 12px; }
        .file-manager-header button:hover { background: #ff6b00; }
        .file-tree { flex: 1; overflow-y: auto; padding: 12px; }
        .file-item, .folder-item { padding: 8px 12px; margin: 2px 0; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .file-item:hover, .folder-item:hover { background: #3d3d4a; }
        .file-item.active { background: #ff6b00; }
        .folder-item { color: #ffd700; }
        .folder-children { margin-left: 24px; }
        .file-actions { display: none; gap: 8px; }
        .file-item:hover .file-actions, .folder-item:hover .file-actions { display: flex; }
        .file-actions button { background: none; border: none; cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 4px; }
        .file-actions button.edit { color: #4a90e2; }
        .file-actions button.delete { color: #ff5252; }
        
        .editor-panel { flex: 1; display: flex; flex-direction: column; background: #1e1e2e; }
        .editor-header { padding: 12px 20px; background: #2d2d3a; border-bottom: 1px solid #3d3d4a; display: flex; justify-content: space-between; align-items: center; }
        .current-file { font-size: 14px; color: #ff6b00; }
        .save-btn { background: #ff6b00; border: none; padding: 8px 20px; border-radius: 8px; color: white; cursor: pointer; }
        .code-editor { flex: 1; width: 100%; padding: 20px; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; background: #1e1e2e; color: #e0e0e0; border: none; resize: none; outline: none; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #2d2d3a; padding: 24px; border-radius: 16px; width: 400px; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; background: #1e1e2e; border: 1px solid #3d3d4a; border-radius: 8px; color: white; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-buttons button { padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .modal-buttons .confirm { background: #ff6b00; border: none; color: white; }
        .modal-buttons .cancel { background: #3d3d4a; border: none; color: white; }
        
        .status-bar { background: #2d2d3a; padding: 6px 20px; font-size: 12px; color: #a0a0a0; border-top: 1px solid #3d3d4a; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1><span class="code-orange">Code</span><span class="pedia">pedia</span> Editor</h1></div>
        <div class="nav-links">
            <a href="hosting.html">← Мои проекты</a>
            <a href="#" id="previewLink">👁️ Предпросмотр</a>
        </div>
    </div>

    <div class="main-container">
        <div class="file-manager">
            <div class="file-manager-header">
                <button onclick="showNewFileModal()">📄 Новый файл</button>
                <button onclick="showNewFolderModal()">📁 Новая папка</button>
                <button onclick="uploadFile()">📤 Загрузить</button>
            </div>
            <div class="file-tree" id="fileTree">Загрузка...</div>
        </div>
        
        <div class="editor-panel">
            <div class="editor-header">
                <span class="current-file" id="currentFileLabel">Выберите файл</span>
                <button class="save-btn" onclick="saveCurrentFile()">💾 Сохранить</button>
            </div>
            <textarea class="code-editor" id="codeEditor" placeholder="Выберите файл..." spellcheck="false"></textarea>
        </div>
    </div>
    
    <div class="status-bar" id="statusBar">Готов к работе</div>

    <div id="newFileModal" class="modal"><div class="modal-content"><h3>Создать файл</h3><input type="text" id="newFileName" placeholder="index.html"><div class="modal-buttons"><button class="confirm" onclick="createNewFile()">Создать</button><button class="cancel" onclick="closeModal('newFileModal')">Отмена</button></div></div></div>
    <div id="newFolderModal" class="modal"><div class="modal-content"><h3>Создать папку</h3><input type="text" id="newFolderName" placeholder="images"><div class="modal-buttons"><button class="confirm" onclick="createNewFolder()">Создать</button><button class="cancel" onclick="closeModal('newFolderModal')">Отмена</button></div></div></div>
    <div id="renameModal" class="modal"><div class="modal-content"><h3>Переименовать</h3><input type="text" id="renameInput"><div class="modal-buttons"><button class="confirm" onclick="renameFile()">Сохранить</button><button class="cancel" onclick="closeModal('renameModal')">Отмена</button></div></div></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectSlug = urlParams.get('slug');
        let currentUser = null, currentSessionId = localStorage.getItem('sessionId');
        let currentProject = null, currentFile = null, files = {}, currentRenamePath = null;

        if (!projectSlug) { alert('Проект не указан'); window.location.href = 'hosting.html'; }

        async function loadProject() {
            try {
                const res = await fetch(`/api/projects/${projectSlug}`);
                if (!res.ok) throw new Error();
                currentProject = await res.json();
                document.getElementById('previewLink').href = `/site/${projectSlug}`;
                document.title = `${currentProject.title} — Редактор`;
                await loadFiles();
            } catch(e) { alert('Проект не найден'); window.location.href = 'hosting.html'; }
        }
        
        async function loadFiles() {
            try {
                const res = await fetch(`/api/projects/${projectSlug}/files`, { headers: { 'X-Session-Id': currentSessionId } });
                if (res.ok) { files = await res.json(); renderFileTree(); }
                else { document.getElementById('fileTree').innerHTML = '<div style="padding:20px;text-align:center;">❌ Ошибка загрузки</div>'; }
            } catch(e) { setStatus('Ошибка загрузки', true); }
        }
        
        function renderFileTree() {
            const tree = {};
            for (const [path, content] of Object.entries(files)) {
                const parts = path.split('/');
                let current = tree;
                for (let i = 0; i < parts.length; i++) {
                    if (i === parts.length - 1) current[parts[i]] = { type: 'file', content };
                    else { if (!current[parts[i]]) current[parts[i]] = { type: 'folder', children: {} }; current = current[parts[i]].children; }
                }
            }
            document.getElementById('fileTree').innerHTML = renderTreeHtml(tree);
        }
        
        function renderTreeHtml(tree, path = '') {
            let html = '';
            for (const [name, item] of Object.entries(tree)) {
                const fullPath = path ? `${path}/${name}` : name;
                if (item.type === 'folder') {
                    html += `<div class="folder-item" onclick="toggleFolder(this)"><span class="file-icon">📁</span><span class="file-name">${escapeHtml(name)}</span><div class="file-actions"><button class="edit" onclick="event.stopPropagation(); showRenameModal('${fullPath}')">✏️</button><button class="delete" onclick="event.stopPropagation(); deleteFile('${fullPath}')">🗑️</button></div></div><div class="folder-children" style="display:none;">${renderTreeHtml(item.children, fullPath)}</div>`;
                } else {
                    const icon = name.endsWith('.html') ? '🌐' : name.endsWith('.css') ? '🎨' : name.endsWith('.js') ? '⚡' : '📄';
                    html += `<div class="file-item" onclick="openFile('${fullPath}')"><span class="file-icon">${icon}</span><span class="file-name">${escapeHtml(name)}</span><div class="file-actions"><button class="edit" onclick="event.stopPropagation(); showRenameModal('${fullPath}')">✏️</button><button class="delete" onclick="event.stopPropagation(); deleteFile('${fullPath}')">🗑️</button></div></div>`;
                }
            }
            return html;
        }
        
        function toggleFolder(el) { const children = el.nextElementSibling; if (children && children.classList.contains('folder-children')) children.style.display = children.style.display === 'none' ? 'block' : 'none'; }
        function openFile(path) { currentFile = path; document.getElementById('currentFileLabel').textContent = path; document.getElementById('codeEditor').value = files[path] || ''; }
        async function saveCurrentFile() { if (!currentFile) { setStatus('Выберите файл', true); return; } await saveFile(currentFile, document.getElementById('codeEditor').value); }
        async function saveFile(path, content) { setStatus('Сохранение...'); try { const res = await fetch(`/api/projects/${projectSlug}/files`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Session-Id': currentSessionId }, body: JSON.stringify({ path, content }) }); if (res.ok) { files[path] = content; setStatus(`✅ Сохранено`); } else setStatus('❌ Ошибка', true); } catch(e) { setStatus('❌ Ошибка', true); } }
        async function createNewFile() { const name = document.getElementById('newFileName').value.trim(); if (!name) return; await saveFile(name, ''); closeModal('newFileModal'); await loadFiles(); document.getElementById('newFileName').value = ''; }
        async function createNewFolder() { const name = document.getElementById('newFolderName').value.trim(); if (!name) return; await saveFile(`${name}/.folder`, ''); closeModal('newFolderModal'); await loadFiles(); document.getElementById('newFolderName').value = ''; }
        async function deleteFile(path) { if (!confirm(`Удалить ${path}?`)) return; setStatus('Удаление...'); try { const res = await fetch(`/api/projects/${projectSlug}/files`, { method: 'DELETE', headers: { 'Content-Type': 'application/json', 'X-Session-Id': currentSessionId }, body: JSON.stringify({ path }) }); if (res.ok) { delete files[path]; if (currentFile === path) { currentFile = null; document.getElementById('currentFileLabel').textContent = 'Выберите файл'; document.getElementById('codeEditor').value = ''; } renderFileTree(); setStatus(`✅ Удалено`); } else setStatus('❌ Ошибка', true); } catch(e) { setStatus('❌ Ошибка', true); } }
        function showRenameModal(path) { currentRenamePath = path; document.getElementById('renameInput').value = path.split('/').pop(); document.getElementById('renameModal').classList.add('active'); }
        async function renameFile() { const newName = document.getElementById('renameInput').value.trim(); if (!newName || !currentRenamePath) return; const parts = currentRenamePath.split('/'); parts[parts.length-1] = newName; const newPath = parts.join('/'); setStatus('Переименование...'); try { const res = await fetch(`/api/projects/${projectSlug}/files/rename`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Session-Id': currentSessionId }, body: JSON.stringify({ oldPath: currentRenamePath, newPath }) }); if (res.ok) { files[newPath] = files[currentRenamePath]; delete files[currentRenamePath]; if (currentFile === currentRenamePath) currentFile = newPath; renderFileTree(); setStatus(`✅ Переименовано`); } else setStatus('❌ Ошибка', true); } catch(e) { setStatus('❌ Ошибка', true); } closeModal('renameModal'); currentRenamePath = null; }
        function uploadFile() { const input = document.createElement('input'); input.type = 'file'; input.onchange = async (e) => { const file = e.target.files[0]; if (!file) return; const content = await file.text(); await saveFile(file.name, content); await loadFiles(); }; input.click(); }
        function showNewFileModal() { document.getElementById('newFileModal').classList.add('active'); }
        function showNewFolderModal() { document.getElementById('newFolderModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function setStatus(msg, isError = false) { const bar = document.getElementById('statusBar'); bar.innerHTML = msg; bar.style.color = isError ? '#ff5252' : '#a0a0a0'; setTimeout(() => { if (bar.innerHTML === msg) bar.innerHTML = 'Готов к работе'; bar.style.color = '#a0a0a0'; }, 3000); }
        function escapeHtml(t) { return t.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        loadProject();
    </script>
</body>
</html>
