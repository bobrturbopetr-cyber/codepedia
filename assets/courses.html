<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курсы — Codepedia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; color: #e0e0e0; }
        
        .header { background: rgba(15, 18, 40, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 107, 0, 0.3); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { font-size: 28px; }
        .code-orange { color: #ff6b00; }
        .pedia { color: #4a90e2; }
        .nav-links a { color: #e0e0e0; text-decoration: none; margin-left: 24px; }
        .nav-links a:hover, .nav-links a.active { color: #ff6b00; }
        
        .container { max-width: 1300px; margin: 0 auto; padding: 30px; }
        .hero { text-align: center; padding: 50px 20px; background: rgba(255,255,255,0.03); border-radius: 30px; margin-bottom: 40px; }
        .hero h1 { font-size: 48px; margin-bottom: 16px; background: linear-gradient(135deg, #ff6b00, #4a90e2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 18px; color: #a0a0a0; max-width: 700px; margin: 0 auto; }
        
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }
        .course-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; cursor: pointer; }
        .course-card:hover { transform: translateY(-8px); border-color: #ff6b00; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .course-cover { height: 140px; background: linear-gradient(135deg, #ff6b00, #4a90e2); display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .course-info { padding: 24px; }
        .course-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .course-desc { font-size: 14px; color: #a0a0a0; margin-bottom: 16px; line-height: 1.5; }
        .course-meta { display: flex; gap: 20px; font-size: 13px; color: #ff6b00; margin-bottom: 16px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 16px; }
        .progress-fill { height: 100%; background: #4caf50; width: 0%; transition: width 0.3s; }
        .btn-start { background: #ff6b00; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s; }
        .btn-start:hover { background: #ff8533; transform: scale(1.02); }
        
        .level-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; margin-bottom: 12px; }
        .level-beginner { background: #2e7d32; color: white; }
        .level-intermediate { background: #ed6c02; color: white; }
        .level-advanced { background: #d32f2f; color: white; }
        
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.1); padding: 6px 16px 6px 10px; border-radius: 50px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #ff6b00; }
        .auth-buttons { display: flex; gap: 12px; }
        .login-btn-header, .register-btn-header { padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 500; }
        .login-btn-header { background: transparent; border: 1px solid #4a90e2; color: #4a90e2; }
        .register-btn-header { background: #ff6b00; border: none; color: white; }
        
        .footer { text-align: center; padding: 30px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 40px; color: #666; }
        
        @media (max-width: 768px) { .hero h1 { font-size: 32px; } .courses-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1><span class="code-orange">Code</span><span class="pedia">pedia</span> Courses</h1></div>
        <div class="nav-links">
            <a href="index.html">🏠 Главная</a>
            <a href="courses.html" class="active">📚 Курсы</a>
            <a href="tutor-chat.html">💬 Репетитор</a>
        </div>
        <div id="authBlock"></div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>🎓 Подготовка к ВСОШ</h1>
            <p>Полный курс по алгоритмам и структурам данных. Реальные задачи, автоматическая проверка кода и помощь репетитора.</p>
        </div>
        <div id="coursesGrid" class="courses-grid"><div style="text-align:center; padding:50px;">Загрузка курсов...</div></div>
    </div>

    <div class="footer"><p>Codepedia Courses — подготовка к ВСОШ | © 2024-2026</p></div>

    <script>
        let currentUser = null, currentSessionId = localStorage.getItem('sessionId');
        
        async function loadUser() {
            if (!currentSessionId) return;
            try {
                const res = await fetch('/api/me', { headers: { 'X-Session-Id': currentSessionId } });
                if (res.ok) currentUser = (await res.json()).user;
            } catch(e) {}
        }
        
        async function loadCourses() {
            try {
                const [coursesRes, progressRes] = await Promise.all([
                    fetch('/api/courses'),
                    currentUser ? fetch('/api/user-progress', { headers: { 'X-Session-Id': currentSessionId } }) : Promise.resolve({ ok: false, json: async () => ({}) })
                ]);
                const courses = await coursesRes.json();
                const progress = progressRes.ok ? await progressRes.json() : {};
                
                const grid = document.getElementById('coursesGrid');
                if (!courses.length) { grid.innerHTML = '<div style="text-align:center; padding:50px;">Курсы скоро появятся...</div>'; return; }
                
                grid.innerHTML = courses.map(course => {
                    const courseLessons = progress[course.id] || { completed: 0, total: course.lessons_count };
                    const percent = courseLessons.total ? (courseLessons.completed / courseLessons.total * 100) : 0;
                    const levelClass = { beginner: 'level-beginner', intermediate: 'level-intermediate', advanced: 'level-advanced' }[course.level];
                    const levelText = { beginner: '🌱 Начинающий', intermediate: '📘 Средний', advanced: '🔥 Продвинутый' }[course.level];
                    return `
                        <div class="course-card" onclick="window.location.href='course.html?id=${course.id}'">
                            <div class="course-cover">${course.cover || '📚'}</div>
                            <div class="course-info">
                                <div><span class="level-badge ${levelClass}">${levelText}</span></div>
                                <div class="course-title">${escapeHtml(course.title)}</div>
                                <div class="course-desc">${escapeHtml(course.description)}</div>
                                <div class="course-meta"><span>⏱️ ${course.duration}</span><span>📖 ${course.lessons_count} уроков</span></div>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
                                <button class="btn-start">${percent === 0 ? '🚀 Начать курс' : percent === 100 ? '✅ Пройден' : '📖 Продолжить'}</button>
                            </div>
                        </div>`;
                }).join('');
            } catch(e) { document.getElementById('coursesGrid').innerHTML = '<div style="text-align:center;padding:50px;">Ошибка загрузки</div>'; }
        }
        
        function escapeHtml(t) { const div = document.createElement('div'); div.textContent = t; return div.innerHTML; }
        
        function updateUI() {
            const authBlock = document.getElementById('authBlock');
            if (currentUser) {
                authBlock.innerHTML = `<div class="user-info"><img class="user-avatar" src="${currentUser.avatar || ''}"><span class="user-name">${currentUser.name || currentUser.email}</span><button class="logout-btn" onclick="logout()">Выйти</button></div>`;
            } else {
                authBlock.innerHTML = `<div class="auth-buttons"><button class="login-btn-header" onclick="window.location.href='index.html'">Вход</button><button class="register-btn-header" onclick="window.location.href='index.html'">Регистрация</button></div>`;
            }
        }
        
        async function logout() { if (currentSessionId) await fetch('/api/logout', { method: 'POST', headers: { 'X-Session-Id': currentSessionId } }); localStorage.clear(); window.location.href = 'index.html'; }
        
        loadUser().then(() => { updateUI(); loadCourses(); });
    </script>
</body>
</html>
