<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Утилиты — Codepedia DevKit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; color: #e0e0e0; }
        
        .header { background: rgba(15, 18, 40, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 107, 0, 0.3); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo h1 { font-size: 28px; }
        .code-orange { color: #ff6b00; }
        .pedia { color: #4a90e2; }
        .nav-links a { color: #e0e0e0; text-decoration: none; margin-left: 24px; }
        .nav-links a:hover { color: #ff6b00; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 30px; }
        .tool-section { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 24px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .tool-section h2 { margin-bottom: 20px; color: #ff6b00; display: flex; align-items: center; gap: 10px; }
        textarea, input, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-family: monospace; margin-bottom: 15px; }
        button { background: #ff6b00; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #ff8533; }
        .result { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; font-family: monospace; margin-top: 15px; white-space: pre-wrap; word-break: break-all; }
        .error { color: #ff5252; }
        .success { color: #4caf50; }
        
        .footer { text-align: center; padding: 30px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 40px; color: #666; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: rgba(255,255,255,0.1); color: #e0e0e0; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .tab-btn.active { background: #ff6b00; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        @media (max-width: 768px) { .container { padding: 20px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><h1><span class="code-orange">Code</span><span class="pedia">pedia</span> DevKit</h1></div>
        <div class="nav-links">
            <a href="index.html">🏠 Главная</a>
            <a href="devkit.html">🛠️ DevKit</a>
            <a href="devkit-utils.html" class="active">🔧 Утилиты</a>
        </div>
        <div id="authBlock"></div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('json')">JSON</button>
            <button class="tab-btn" onclick="switchTab('jwt')">JWT</button>
            <button class="tab-btn" onclick="switchTab('base64')">Base64</button>
            <button class="tab-btn" onclick="switchTab('hash')">Hash</button>
            <button class="tab-btn" onclick="switchTab('regex')">Regex</button>
        </div>

        <!-- JSON Validator -->
        <div id="json-tab" class="tab-content active">
            <div class="tool-section">
                <h2>📋 JSON Validator & Formatter</h2>
                <textarea id="jsonInput" rows="10" placeholder='{"name": "Codepedia", "year": 2024}'></textarea>
                <div>
                    <button onclick="formatJson()">🎨 Форматировать</button>
                    <button onclick="minifyJson()">📦 Минифицировать</button>
                    <button onclick="validateJson()">✅ Проверить</button>
                </div>
                <div id="jsonResult" class="result"></div>
            </div>
        </div>

        <!-- JWT Decoder -->
        <div id="jwt-tab" class="tab-content">
            <div class="tool-section">
                <h2>🔐 JWT Decoder</h2>
                <textarea id="jwtInput" rows="5" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"></textarea>
                <button onclick="decodeJwt()">🔓 Декодировать</button>
                <div id="jwtResult" class="result"></div>
            </div>
        </div>

        <!-- Base64 Encoder/Decoder -->
        <div id="base64-tab" class="tab-content">
            <div class="tool-section">
                <h2>🔄 Base64 Encoder / Decoder</h2>
                <textarea id="base64Input" rows="5" placeholder="Текст или Base64 строка..."></textarea>
                <div>
                    <button onclick="encodeBase64()">🔒 Кодировать →</button>
                    <button onclick="decodeBase64()">🔓 Декодировать ←</button>
                </div>
                <div id="base64Result" class="result"></div>
            </div>
        </div>

        <!-- Hash Generator -->
        <div id="hash-tab" class="tab-content">
            <div class="tool-section">
                <h2>🔒 Хеш-генератор</h2>
                <textarea id="hashInput" rows="5" placeholder="Текст для хеширования..."></textarea>
                <div>
                    <button onclick="generateHash('md5')">MD5</button>
                    <button onclick="generateHash('sha1')">SHA-1</button>
                    <button onclick="generateHash('sha256')">SHA-256</button>
                    <button onclick="generateHash('sha512')">SHA-512</button>
                </div>
                <div id="hashResult" class="result"></div>
            </div>
        </div>

        <!-- Regex Tester -->
        <div id="regex-tab" class="tab-content">
            <div class="tool-section">
                <h2>📝 Regex Tester</h2>
                <input type="text" id="regexPattern" placeholder="Регулярное выражение (например: \d+)" style="width:100%;">
                <textarea id="regexText" rows="8" placeholder="Текст для проверки..."></textarea>
                <button onclick="testRegex()">🔍 Найти совпадения</button>
                <div id="regexResult" class="result"></div>
            </div>
        </div>
    </div>

    <div class="footer"><p>Codepedia DevKit — инструменты для разработчиков | © 2024-2026</p></div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
            event.target.classList.add('active');
        }

        // JSON
        function formatJson() {
            try {
                const obj = JSON.parse(document.getElementById('jsonInput').value);
                document.getElementById('jsonResult').innerHTML = `<span class="success">✅ Валидный JSON</span><br><pre>${JSON.stringify(obj, null, 2)}</pre>`;
            } catch(e) {
                document.getElementById('jsonResult').innerHTML = `<span class="error">❌ Ошибка: ${e.message}</span>`;
            }
        }
        function minifyJson() {
            try {
                const obj = JSON.parse(document.getElementById('jsonInput').value);
                document.getElementById('jsonResult').innerHTML = `<span class="success">✅ Минифицировано</span><br><pre>${JSON.stringify(obj)}</pre>`;
            } catch(e) {
                document.getElementById('jsonResult').innerHTML = `<span class="error">❌ Ошибка: ${e.message}</span>`;
            }
        }
        function validateJson() {
            try {
                JSON.parse(document.getElementById('jsonInput').value);
                document.getElementById('jsonResult').innerHTML = '<span class="success">✅ JSON валиден</span>';
            } catch(e) {
                document.getElementById('jsonResult').innerHTML = `<span class="error">❌ ${e.message}</span>`;
            }
        }

        // JWT
        function decodeJwt() {
            const token = document.getElementById('jwtInput').value.trim();
            if (!token) { document.getElementById('jwtResult').innerHTML = '<span class="error">Введите JWT токен</span>'; return; }
            try {
                const parts = token.split('.');
                if (parts.length !== 3) throw new Error('Неверный формат JWT');
                const header = JSON.parse(atob(parts[0]));
                const payload = JSON.parse(atob(parts[1]));
                document.getElementById('jwtResult').innerHTML = `
                    <span class="success">✅ JWT декодирован</span><br>
                    <strong>Header:</strong><br><pre>${JSON.stringify(header, null, 2)}</pre>
                    <strong>Payload:</strong><br><pre>${JSON.stringify(payload, null, 2)}</pre>
                    <strong>Signature:</strong><br>${parts[2].substring(0, 50)}...
                `;
            } catch(e) {
                document.getElementById('jwtResult').innerHTML = `<span class="error">❌ ${e.message}</span>`;
            }
        }

        // Base64
        function encodeBase64() {
            const text = document.getElementById('base64Input').value;
            const encoded = btoa(unescape(encodeURIComponent(text)));
            document.getElementById('base64Result').innerHTML = `<span class="success">✅ Закодировано</span><br><pre>${encoded}</pre>`;
        }
        function decodeBase64() {
            const text = document.getElementById('base64Input').value;
            try {
                const decoded = decodeURIComponent(escape(atob(text)));
                document.getElementById('base64Result').innerHTML = `<span class="success">✅ Декодировано</span><br><pre>${decoded}</pre>`;
            } catch(e) {
                document.getElementById('base64Result').innerHTML = `<span class="error">❌ Неверный Base64</span>`;
            }
        }

        // Hash
        async function generateHash(algo) {
            const text = document.getElementById('hashInput').value;
            if (!text) { document.getElementById('hashResult').innerHTML = '<span class="error">Введите текст</span>'; return; }
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            let hash;
            if (algo === 'md5') {
                // MD5 не поддерживается в Web Crypto, используем простую имитацию
                document.getElementById('hashResult').innerHTML = `<span class="success">✅ ${algo.toUpperCase()}</span><br><pre>${await simpleMd5(text)}</pre>`;
                return;
            }
            const hashBuffer = await crypto.subtle.digest(algo.toUpperCase(), data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            document.getElementById('hashResult').innerHTML = `<span class="success">✅ ${algo.toUpperCase()}</span><br><pre>${hashHex}</pre>`;
        }
        async function simpleMd5(str) {
            // Простая имитация MD5 (не для криптографии)
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(16);
        }

        // Regex
        function testRegex() {
            const pattern = document.getElementById('regexPattern').value;
            const text = document.getElementById('regexText').value;
            if (!pattern) { document.getElementById('regexResult').innerHTML = '<span class="error">Введите регулярное выражение</span>'; return; }
            try {
                const regex = new RegExp(pattern, 'g');
                const matches = [...text.matchAll(regex)];
                if (matches.length === 0) {
                    document.getElementById('regexResult').innerHTML = '<span class="error">❌ Совпадений не найдено</span>';
                } else {
                    document.getElementById('regexResult').innerHTML = `<span class="success">✅ Найдено ${matches.length} совпадений</span><br><pre>${matches.map(m => m[0]).join('\n')}</pre>`;
                }
            } catch(e) {
                document.getElementById('regexResult').innerHTML = `<span class="error">❌ ${e.message}</span>`;
            }
        }

        let currentUser = null, currentSessionId = localStorage.getItem('sessionId');
        async function loadUser() {
            if (!currentSessionId) return;
            try {
                const res = await fetch('/api/me', { headers: { 'X-Session-Id': currentSessionId } });
                if (res.ok) { const data = await res.json(); currentUser = data.user; }
            } catch(e) {}
        }
        function updateUI() {
            const authBlock = document.getElementById('authBlock');
            if (currentUser) authBlock.innerHTML = `<div class="user-info"><img class="user-avatar" src="${currentUser.avatar || ''}"><span class="user-name">${currentUser.name}</span><button onclick="logout()">Выйти</button></div>`;
            else authBlock.innerHTML = `<div class="auth-buttons"><button onclick="location.href='index.html'">Вход</button><button onclick="location.href='index.html'">Регистрация</button></div>`;
        }
        async function logout() { if (currentSessionId) await fetch('/api/logout', { method: 'POST', headers: { 'X-Session-Id': currentSessionId } }); localStorage.clear(); window.location.href = 'index.html'; }
        loadUser().then(updateUI);
    </script>
</body>
</html>
